<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consignment Academy</title>
<style>
  :root{
    --bg:#0e1518; --panel:#13201f; --panel2:#182c2a; --line:#244340;
    --ink:#eaf3ef; --muted:#9fb6b0; --gold:#d8b45a; --gold2:#b9912f;
    --green:#5dcaa5; --amber:#efb14a; --red:#e2766a; --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6;font-size:16px}
  a{color:var(--gold)}
  .wrap{max-width:1040px;margin:0 auto;padding:0 18px}
  header.top{border-bottom:1px solid var(--line);background:#0b1113;position:sticky;top:0;z-index:20}
  .top .wrap{display:flex;align-items:center;gap:16px;height:60px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:.3px}
  .brand .mark{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;color:#1a1407;font-weight:700;font-size:12px}
  nav.tabs{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
  nav.tabs button{background:transparent;border:1px solid transparent;color:var(--muted);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:14px}
  nav.tabs button.on{color:var(--ink);border-color:var(--line);background:var(--panel)}
  nav.tabs button:hover{color:var(--ink)}
  h1{font-size:24px;margin:26px 0 4px}
  h2{font-size:19px;margin:24px 0 10px}
  h3{font-size:16px;margin:18px 0 6px}
  .sub{color:var(--muted);margin:0 0 18px}
  .tierhead{display:flex;align-items:baseline;gap:10px;margin:28px 0 10px;border-bottom:1px solid var(--line);padding-bottom:8px}
  .tierhead .tg{color:var(--gold);font-weight:600;font-size:13px;letter-spacing:1px;text-transform:uppercase}
  .tierhead .tn{color:var(--muted);font-size:14px}
  .mods{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .mod{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color .15s}
  .mod:hover{border-color:var(--gold2)}
  .mod.locked{opacity:.5;cursor:not-allowed}
  .mod .mid{font-size:12px;color:var(--muted);letter-spacing:.5px}
  .mod .mname{font-weight:600;margin:3px 0 6px}
  .mod .mcert{font-size:13px;color:var(--muted)}
  .pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;margin-top:9px;font-weight:600}
  .pill.locked{background:#1b2628;color:var(--muted)}
  .pill.avail{background:rgba(216,180,90,.14);color:var(--gold)}
  .pill.await{background:rgba(239,177,74,.16);color:var(--amber)}
  .pill.cert{background:rgba(93,202,165,.16);color:var(--green)}
  .pill.drill{background:rgba(216,180,90,.1);color:var(--gold);border:1px solid var(--gold2)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin:16px 0}
  .panel.gold{border-color:var(--gold2)}
  .brief p{margin:8px 0}.brief ul{margin:8px 0 8px 2px;padding-left:18px}.brief li{margin:5px 0}
  .brief b{color:#f3e6c4}
  .flow{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
  .flow span{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:4px 9px;font-size:12.5px}
  .flow span.dead{border-color:var(--red);color:#f0b8b0}
  .btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1407;border:none;font-weight:600;padding:10px 18px;border-radius:9px;cursor:pointer;font-size:15px}
  .btn:hover{filter:brightness(1.06)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn.ghost:hover{border-color:var(--gold2)}
  .btn.small{padding:6px 12px;font-size:13px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  label.f{display:block;font-size:13px;color:var(--muted);margin:12px 0 4px}
  input,select,textarea{width:100%;background:#0c1416;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 11px;font-size:15px;font-family:inherit}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold2)}
  .q{margin:14px 0;padding:14px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)}
  .q .opt{display:block;padding:9px 12px;margin:7px 0;border:1px solid var(--line);border-radius:8px;cursor:pointer}
  .q .opt:hover{border-color:var(--gold2)}
  .q .opt.sel{border-color:var(--gold);background:rgba(216,180,90,.08)}
  .q .opt.correct{border-color:var(--green);background:rgba(93,202,165,.1)}
  .q .opt.wrong{border-color:var(--red);background:rgba(226,118,106,.1)}
  .chat{height:380px;overflow-y:auto;background:#0c1416;border:1px solid var(--line);border-radius:10px;padding:14px;margin:10px 0}
  .msg{margin:8px 0;max-width:82%;padding:9px 13px;border-radius:12px;font-size:15px}
  .msg.them{background:var(--panel2);border:1px solid var(--line)}
  .msg.me{background:rgba(216,180,90,.12);margin-left:auto;border:1px solid var(--gold2)}
  .beat{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
  .dot{width:11px;height:11px;border-radius:50%;margin-top:6px;flex:none}
  .dot.hit{background:var(--green)} .dot.partial{background:var(--amber)} .dot.miss{background:var(--red)}
  .score{font-size:46px;font-weight:700;color:var(--gold)}
  .muted{color:var(--muted)} .small{font-size:13px}
  .kv{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);font-size:14px}
  .hide{display:none}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .notice{background:rgba(216,180,90,.08);border:1px solid var(--gold2);border-radius:10px;padding:12px 14px;font-size:14px;margin:12px 0}
  .metric{background:var(--panel2);border-radius:10px;padding:14px 16px;text-align:center}
  .metric .n{font-size:26px;font-weight:700;color:var(--gold)}.metric .l{font-size:12px;color:var(--muted)}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:12px 0}
  .prog{font-size:13px;color:var(--muted);margin:6px 0 0}
</style>
</head>
<body>
<header class="top"><div class="wrap">
  <div class="brand"><span class="mark">CA</span> Consignment Academy</div>
  <nav class="tabs" id="tabs">
    <button data-v="ladder" class="on">Ladder</button>
    <button data-v="playbook">Playbook</button>
    <button data-v="bestcalls">Best calls</button>
    <button data-v="admin">Admin</button>
  </nav>
</div></header>

<main class="wrap">
  <section id="v-ladder">
    <h1>Certification ladder</h1>
    <p class="sub">From a brand-new trainee to a closer who signs consignors efficiently. Learn the product first, then the pipeline, then the close. Pass the 20-question test, run the drills, a manager certifies you, the next module opens.</p>
    <div id="metricsTop"></div>
    <div id="ladder"></div>
  </section>
  <section id="v-module" class="hide"></section>
  <section id="v-playbook" class="hide"></section>
  <section id="v-bestcalls" class="hide"></section>
  <section id="v-admin" class="hide"></section>
</main>

<script>
/* ===== state ===== */
const KEY="consignment-academy-v2";
const DEF={trainee:"trainee1",
  settings:{proxyUrl:"",proxyPass:"",adminPass:"ADMIN-2024",mgrPass:"MANAGER-2024",location:"Default",certifier:"",passQuota:6,passTarget:80},
  progress:{}, metrics:{hammer:0,pitches:0,signed:0}, bestCalls:[], preview:false};
let S=load();
function load(){try{const x=JSON.parse(localStorage.getItem(KEY));return x?Object.assign(structuredClone(DEF),x):structuredClone(DEF)}catch(e){return structuredClone(DEF)}}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}

/* ===== curriculum ===== */
const STD=85, MONEY=90;
const MOD=[
 // Tier I Product Knowledge
 {id:"p1.1",tier:"I. Product Knowledge",name:"Precious metals & purity",pass:MONEY,type:"test",cert:"Identify gold, silver and platinum by their stamps, read karat and purity marks, tell solid from plated and filled, and know that value tracks spot per troy ounce."},
 {id:"p1.2",tier:"I. Product Knowledge",name:"Coins: bullion, graded & raw",pass:MONEY,type:"test",cert:"Tell bullion from numismatic, graded from raw, and know the US silver series and their silver content by era. Never clean a coin."},
 {id:"p1.3",tier:"I. Product Knowledge",name:"Testing & authenticating",pass:MONEY,type:"test",cert:"Use the magnet, scale, dimension and acid tests correctly, know what XRF does, and know the one thing you must never do to a coin."},
 {id:"p1.4",tier:"I. Product Knowledge",name:"Watches, jewelry & diamonds",pass:STD,type:"test",cert:"Judge a watch by jewels and brand, tell luxury from fashion, describe a diamond by the 4 Cs, and know when to route to the specialist."},
 {id:"p1.5",tier:"I. Product Knowledge",name:"Cards, comics & collectibles",pass:STD,type:"test",cert:"Recognize the vintage cards, comics and collectibles worth flagging, and follow one rule: proof of value or route, never guess."},
 {id:"p1.6",tier:"I. Product Knowledge",name:"Value & what is auction-worthy",pass:MONEY,type:"test",cert:"Name the right value source for each item type and judge what is worth consigning versus what is not."},
 // Tier II Originator & pipeline
 {id:"o2.1",tier:"II. Originator",name:"Foundation & the offer",pass:STD,type:"test",cert:"Explain who we are, the Full Estate Program, why auction beats cash and beats competitors, and the one rule that protects every deal."},
 {id:"o2.2",tier:"II. Originator",name:"The pipeline, end to end",pass:STD,type:"test",cert:"Name every stage of the real consignment pipeline in order and know what each one means and what to do in it."},
 {id:"o2.3",tier:"II. Originator",name:"The contact ladder & speed to lead",pass:STD,type:"test",cert:"Work a new lead through the contact attempts, hit the five-minute standard, and move every lead to the right next stage."},
 {id:"o2.4",tier:"II. Originator",name:"Qualify, route & the no-stages",pass:STD,type:"test",cert:"Run the routing question and the five reads, and place every lead correctly, including soft no, hard no, un-qualified, cold, and bad lead."},
 {id:"o2.5",tier:"II. Originator",name:"DocuSign, label & package flow",pass:STD,type:"test",cert:"Move a qualified consignor through Sent Docusign, Sent Shipping Label, Waiting On Package, Package Received and Intake without losing them."},
 {id:"o2.6",tier:"II. Originator",name:"Reactivation: win back cold leads",pass:STD,type:"drill",drill:"reactivation",cert:"Re-engage a cold, soft-no or lost consignor lead and move them back into the flow. Live AI drill."},
 // Tier III Closer
 {id:"c3.1",tier:"III. Closer",name:"The CLOSE framework",pass:MONEY,type:"test",cert:"Run Connect, Learn, Outshine, Set, Execute on the phone, end to end, efficiently."},
 {id:"c3.2",tier:"III. Closer",name:"Two-number anchor & reserve",pass:MONEY,type:"test",cert:"Set a protective, sellable reserve case by case, and present the cash floor versus auction upside."},
 {id:"c3.3",tier:"III. Closer",name:"Outshine: authority & the auction story",pass:STD,type:"test",cert:"Position the house, tell the auction-upside story with proof, and out-position the named competitor."},
 {id:"c3.4",tier:"III. Closer",name:"Objections & stalls",pass:STD,type:"test",cert:"Handle the five core consignment objections cleanly."},
 {id:"c3.5",tier:"III. Closer",name:"Expectations & the gates",pass:STD,type:"test",cert:"Set realistic timelines, state payout correctly, and protect the rating and collection gates by never over-promising."},
 {id:"c3.6",tier:"III. Closer",name:"The Competitive Close",pass:MONEY,type:"drill",drill:"competitive",cert:"Win the consignment against another auction house on the phone. Live AI drill."},
 {id:"c3.7",tier:"III. Closer",name:"Whale consignment over $100k",pass:MONEY,type:"drill",drill:"whale",cert:"Win a six-figure consignment and get the agreement out. Live AI drill."},
 {id:"c3.8",tier:"III. Closer",name:"Supervised to solo & promotion",pass:STD,type:"test",cert:"Run live closes supervised, then solo, while hitting your hammer-originated target."},
 // Tier IV Manager
 {id:"m4.1",tier:"IV. Manager",name:"Reserve authority & approval",pass:MONEY,type:"test",cert:"Approve reserves and terms within authority and handle escalations."},
 {id:"m4.2",tier:"IV. Manager",name:"Lifecycle & settlement",pass:STD,type:"test",cert:"Manage a consignor from intake to payout, 30 to 45 days after payment is received, and handle the unhappy consignor."},
 {id:"m4.3",tier:"IV. Manager",name:"Numbers & the gates",pass:MONEY,type:"test",cert:"Track conversion, sell-through and payout timing, and protect the gates."},
 {id:"m4.4",tier:"IV. Manager",name:"Coaching & certification",pass:STD,type:"test",cert:"Certify closers, run one-on-ones, and calibrate reserve discipline."},
];
const ORDER=MOD.map(m=>m.id);

/* ===== briefings ===== */
const BRIEF={
 "p1.1":`<p>Before you can talk to a consignor, you need to know what their items are. Most of what walks in is precious metal, and metal value tracks the <b>spot price</b>, the live market price per <b>troy ounce</b> (about 31.1 grams, heavier than a regular ounce).</p>
  <p><b>Gold.</b> Purity is measured in karats out of 24. The stamp tells you everything:</p>
  <ul><li><b>24k = .999</b> pure. <b>22k = .916</b>. <b>18k = .750</b>. <b>14k = .585</b>. <b>10k = .417</b>, the legal minimum to be called gold in the US.</li>
  <li>A piece stamped <b>585</b> is 14k, <b>750</b> is 18k, <b>417</b> is 10k, <b>999</b> is pure.</li>
  <li><b>Not solid gold:</b> GF (gold filled), GP (gold plated), HGE, RGP, and anything like <b>1/20 12K GF</b>. These have little to no melt value. A plated piece is mostly base metal.</li></ul>
  <p><b>Silver.</b> <b>.925 = sterling</b> (stamped 925, Sterling, or Ster). <b>.999 = fine silver</b>, the bullion standard. <b>.900 = coin silver</b>, older. Plated silver is stamped <b>EP, EPNS, or "silver on copper"</b> and is near worthless for melt.</p>
  <p><b>Platinum.</b> Denser and often more valuable than gold. Stamped <b>PT, PLAT, 950, or PT950</b>.</p>
  <p>The discipline: do not guess the metal, find the stamp. A 14k chain and a gold-plated chain can look identical and differ in value by fifty times.</p>`,
 "p1.2":`<p>Coins split two ways, and the rep must read both axes fast.</p>
  <p><b>Bullion versus numismatic.</b> Bullion coins (American Gold and Silver Eagles, Krugerrands, Canadian Maple Leafs) are bought and sold for their metal, near spot plus a small premium. Numismatic coins carry value beyond metal: rarity, date, mint mark, and condition.</p>
  <p><b>Graded versus raw.</b> A <b>graded</b> coin is sealed in a plastic slab by a grading service (PCGS or NGC) with a number on the Sheldon scale of 1 to 70. Graded coins are priced off the <b>CDN Greysheet</b>, the dealer wholesale guide. A <b>raw</b> coin is loose and ungraded, priced off <b>recent sold results</b> (completed sales, not asking prices).</p>
  <p><b>US silver coinage by era, memorize this:</b></p>
  <ul><li><b>Pre-1965</b> dimes, quarters, and half dollars are <b>90% silver</b>, called constitutional or junk silver.</li>
  <li><b>1965 to 1970</b> Kennedy half dollars are <b>40% silver</b>.</li>
  <li><b>Jefferson War Nickels, 1942 to 1945, are 35% silver</b>, the only silver nickels.</li>
  <li>A <b>regular nickel is 75% copper and 25% nickel, with zero silver</b>.</li>
  <li><b>1965 and later</b> dimes and quarters are copper-nickel clad, no silver.</li></ul>
  <p><b>The one rule that protects value: never clean a coin.</b> Cleaning a numismatic coin can erase most of its worth. Key dates and mint marks drive value, so when a date or mint mark could matter and you are not sure, route it to the specialist.</p>`,
 "p1.3":`<p>You confirm what a metal is with simple, non-destructive checks first, and you protect the item at all costs.</p>
  <ul><li><b>Magnet test.</b> Gold, silver, and platinum are <b>not magnetic</b>. If a piece pulls to a magnet, it is base metal or plated steel. Note that some clasps and pins are steel even on a real chain.</li>
  <li><b>Scale and dimensions.</b> Real bullion has exact published weight and diameter. A coin that is off weight or off size is a red flag. A jeweler's scale reads to a tenth of a gram.</li>
  <li><b>Acid or scratch test.</b> A tiny scratch on a test stone, then graded acid, shows the karat. It is mildly destructive, so you never run it on a graded coin or a fine piece without care.</li>
  <li><b>XRF analyzer.</b> The professional tool. It reads the exact metal composition without damaging the item. When in doubt, this is what the shop uses.</li>
  <li><b>Ping or specific-gravity tests</b> help confirm silver and detect fakes.</li></ul>
  <p><b>The one thing you must never do:</b> clean, polish, or scratch a numismatic coin. It destroys the value. When an item could carry serious money and you are not certain, you route it to the specialist rather than guess.</p>`,
 "p1.4":`<p>Watches, jewelry, and stones walk in constantly. You need enough to flag the good ones and route the rest.</p>
  <p><b>Pocket watches.</b> Quality tracks the <b>jewel count</b>: 17, 21, and 23 jewels are better movements. Railroad-grade watches and names like Hamilton, Elgin, Waltham, and Illinois are worth flagging.</p>
  <p><b>Wristwatches.</b> Know luxury from fashion. <b>Luxury:</b> Rolex, Patek Philippe, Omega, Cartier, Audemars Piguet. These get routed to the specialist. <b>Fashion:</b> Fossil, Michael Kors, and similar carry little resale value.</p>
  <p><b>Diamonds, the 4 Cs:</b></p>
  <ul><li><b>Cut</b> (how well it is shaped and how it returns light), <b>Color</b> (graded D, colorless, down to Z), <b>Clarity</b> (FL flawless down through VS, SI, to I), and <b>Carat</b> (weight).</li>
  <li>A stone with a <b>GIA certificate</b> is worth more because its grade is independently verified.</li></ul>
  <p>The rule mirrors coins: a significant watch or stone goes to the specialist or to GIA. You flag value, you do not appraise a diamond by eye.</p>`,
 "p1.5":`<p>Cards and collectibles are easy to misjudge, so the rep flags and routes rather than guesses.</p>
  <ul><li><b>Vintage sports cards.</b> Pre-war tobacco cards (the T206 set) and vintage Topps and Bowman baseball can be very valuable, especially key rookies. <b>Graded</b> cards (PSA, BGS, SGC) are worth far more than raw, and the grade is the value.</li>
  <li><b>Pokemon and trading-card games.</b> The 1999 Base Set, first-edition printings, and holographic cards carry real money, especially graded.</li>
  <li><b>Comics.</b> Golden and Silver Age key issues (first appearances) can be worth a fortune, and CGC grading drives the value.</li>
  <li><b>Other estate items:</b> sterling flatware, gold and silver coins in collections, militaria, and fine art surface in estates and should be flagged.</li></ul>
  <p><b>The one rule: proof of value or route.</b> Flag a card or collectible only with proof, a grade or a recent sold comp, or send it to the specialist. Never guess at value, and never tell a consignor a number you cannot stand behind.</p>`,
 "p1.6":`<p>For consignment you are not making a cash buy on the spot. You are establishing that we can sell the items at auction and get top dollar, and judging whether they are worth consigning at all.</p>
  <p><b>Where value comes from, by item type:</b></p>
  <ul><li><b>Metals and bullion:</b> the <b>spot</b> price. Bullion sells at auction near spot, so it is not where consignment shines.</li>
  <li><b>Graded coins:</b> the <b>CDN Greysheet</b>.</li>
  <li><b>Raw collectibles, cards, and most estate items:</b> <b>recent sold results</b>, what comparable items actually closed at, not asking prices.</li></ul>
  <p><b>What auction is for.</b> Bidder competition discovers true value, so auction wins on <b>scarce, collectible, and high-value</b> items where two motivated buyers can drive the price up. That is what is worth consigning.</p>
  <p><b>What is auction-worthy versus not:</b></p>
  <ul><li><b>Take:</b> collectible and graded coins, rare dates, high-end watches and jewelry, graded cards, fine art, and full estates where we handle everything.</li>
  <li><b>Decline or route to a cash buy:</b> costume jewelry, plated metal, common low-value coins, and small bullion lots the seller just wants gone.</li></ul>`,
 "o2.1":`<p><b>Who we are.</b> A full-service auction house that wins consignments by handling the <b>whole estate</b>, not just the headline pieces. Bidder competition discovers true value, so a consignor usually nets more at auction than any single cash offer.</p>
  <p><b>The offer you represent, the Full Estate Program:</b> we handle everything (intake, photography, cataloging, marketing to our buyer list, and the sale), a <b>cash advance against the lot</b> capped at a percent of the low estimate so they get money before the sale, and the <b>Higher-Hammer Guarantee</b>: bring any written offer, we make it your reserve so you cannot get less, and we beat it at auction or our commission is on us.</p>
  <p><b>How items reach us.</b> Most consignments are remote: we send a DocuSign agreement, then a prepaid shipping label, the consignor ships the items, and we take it from there. Large estates may get pickup.</p>
  <ul><li><b>The avatar we own first:</b> estate executors. <b>The wedge:</b> we do the whole estate.</li>
  <li><b>The one rule that protects every deal:</b> never set a firm value on what you cannot see. Move them forward in the flow.</li></ul>`,
 "o2.2":`<p>This is the real pipeline. Every lead sits in exactly one stage. Know the order, what each stage means, and what you do in it.</p>
  <p><b>The contact ladder (working a new lead):</b></p>
  <div class="flow"><span>(New Lead) Not Contacted</span><span>Attempted to Contact</span><span>Attempt 2</span><span>Attempt 3</span></div>
  <p><b>Interest and qualification:</b></p>
  <div class="flow"><span>Contacted Interested</span><span>Qualified Lead</span></div>
  <p><b>Agreement and getting the items in (remote consignment):</b></p>
  <div class="flow"><span>Sent Docusign</span><span>Sent Shipping Label</span><span>Waiting On Package</span><span>Package Received</span><span>Consignment Intake</span></div>
  <p><b>Back-office processing through to the money:</b></p>
  <div class="flow"><span>Needs Grouping Valued</span><span>Needs Data Entered</span><span>Photo Team</span><span>Upload Team</span><span>Product Sold</span><span>Payout</span></div>
  <p><b>The dead and holding stages (where a lead goes if it does not move forward):</b></p>
  <div class="flow"><span class="dead">Contacted Soft No</span><span class="dead">Contacted Hard No</span><span class="dead">Un-Qualified</span><span class="dead">Cold</span><span class="dead">Bad Lead</span><span class="dead">UnAccounted</span></div>
  <p>An originator lives in the first eleven stages, from Not Contacted through Consignment Intake. After Intake, the back-office teams take over for grouping, valuation, data entry, photos, upload, sale, and payout. Always tag the lead source so origination credit is clean and so we can reactivate later.</p>`,
 "o2.3":`<p>The contact ladder is how a fresh lead becomes a conversation. Speed is the whole game.</p>
  <ul><li><b>Speed to lead: five minutes.</b> A lead that sits an hour is a lead the other house already called. Slow first contact is the number-one reason a deal is lost.</li>
  <li><b>(New Lead) Not Contacted</b> is your queue. Call fast.</li>
  <li>No answer moves the lead to <b>Attempted to Contact</b>, then <b>Attempt 2</b>, then <b>Attempt 3</b> across your call attempts. Each attempt is logged, with a note.</li>
  <li>A real conversation where they are interested moves the lead to <b>Contacted Interested</b>.</li>
  <li>A lead you cannot reach after the attempts does not vanish, it moves to <b>Cold</b> for later reactivation, never just dropped.</li></ul>
  <p>Work the queue top to bottom, fast, every lead logged, every attempt noted. The rep who calls first and most wins the consignment.</p>`,
 "o2.4":`<p>Your job on the phone is to read and route, not to price. It turns on one question and five quick reads.</p>
  <p><b>The routing question:</b> "Do you want the most money even if it takes a few weeks, or do you need cash today?" Most money and can wait equals consignment. Cash now on a small lot routes to the buyers team.</p>
  <p><b>The five quick reads:</b> what do they have, why are they selling, when do they need funds, who was the collector, and what do they think it is all worth.</p>
  <p><b>Placing the lead correctly:</b></p>
  <ul><li><b>Qualified Lead:</b> consignment-worthy items and a seller who will move forward.</li>
  <li><b>Contacted Soft No:</b> not now, but open later. Keep for follow-up and reactivation.</li>
  <li><b>Contacted Hard No:</b> a firm no.</li>
  <li><b>Un-Qualified:</b> items are not auction-worthy (costume, plated, common low value).</li>
  <li><b>Cold:</b> went quiet, for reactivation.</li>
  <li><b>Bad Lead:</b> wrong number, spam, no real items.</li></ul>
  <p>Honest placement keeps the pipeline clean and makes reactivation possible. A lead in the wrong stage is a lead that gets lost.</p>`,
 "o2.5":`<p>Once a consignor says yes, your job is to get the items to us without losing them. This is the remote flow, and each stage is an action.</p>
  <ul><li><b>Sent Docusign.</b> You send the consignment agreement for e-signature. The deal is not real until it is signed.</li>
  <li><b>Sent Shipping Label.</b> You send a prepaid shipping label so it costs them nothing and there is no friction.</li>
  <li><b>Waiting On Package.</b> The label is out, the items are in transit. This is where deals stall, so you follow up: confirm they shipped, get a tracking number.</li>
  <li><b>Package Received.</b> The items arrive and are logged in.</li>
  <li><b>Consignment Intake.</b> The items are formally taken in and handed to the back-office teams.</li></ul>
  <p>The leak in remote consignment is between Sent Shipping Label and Package Received. A signed agreement with no package is not a consignment. Chase the package the way you chased the lead.</p>`,
 "c3.1":`<p>CLOSE is the spine of every consignment call. Run it in order and it is fast, because each step removes a reason to say no before you ask.</p>
  <ul><li><b>C, Connect.</b> Trust, why they reached out, capture contact, position yourself as their advocate, not a buyer trying to pay the least.</li>
  <li><b>L, Learn.</b> The reads: what they have, what they think it is worth, urgency, attachment, knowledge, and who else they are talking to. That last read is what lets you win a competitive deal.</li>
  <li><b>O, Outshine.</b> Position the house and the auction-upside story, then out-position the specific competitor by name without trashing them.</li>
  <li><b>S, Set.</b> Set the reserve case by case and present the two-number anchor: cash floor versus auction upside. Pre-handle commission, timing, and what-if before you ask.</li>
  <li><b>E, Execute.</b> Move to the agreement: "I am going to send the DocuSign now and a prepaid label so you do not pay a cent to ship." Lock the next step.</li></ul>
  <p>On the phone, Execute means the DocuSign goes out on the call, not "I will think about it."</p>`,
 "c3.2":`<p>There is no default reserve. You set it case by case to do two jobs at once: protect the seller's downside and stay low enough to actually sell.</p>
  <ul><li><b>The two-number anchor:</b> show the cash floor (what we would pay today) versus the realizable auction value. The reserve sits at or near the floor, so they cannot get less, only more.</li>
  <li><b>The Higher-Hammer Guarantee:</b> when a seller has a written competing offer, that number becomes the reserve. They are guaranteed at least their best alternative.</li>
  <li><b>Reserve too high</b> kills the sale and leaves a stale, unsold lot. <b>Reserve too low</b> under-protects them. Both are wrong.</li>
  <li><b>The reserve is a floor, not a target.</b> The hammer goes where the bidders take it.</li></ul>`,
 "c3.3":`<p>Outshine is where the deal is won. Two moves: raise their belief they will get top dollar, and out-position the competitor.</p>
  <ul><li><b>Authority:</b> bidder competition discovers true value, we reach a deep collector base, and we do all the work.</li>
  <li><b>Proof:</b> lead with recent comparable hammer results. Specific numbers from items like theirs beat any adjective.</li>
  <li><b>The auction-versus-cash story:</b> one cash buyer pays the least they can. A room of buyers pays the most one of them will.</li>
  <li><b>Out-position the competitor</b> on the axis that matters to this seller. For estate executors that is whole-estate, turnkey handling. Never trash the other house, just be the better fit.</li></ul>`,
 "c3.4":`<p>Five objections kill most consignment deals. Each has one principle.</p>
  <ul><li><b>"Your commission is too high."</b> Reframe ten percent as the cost of the result, the reach and the higher hammer it buys. Do not blind-discount.</li>
  <li><b>"How long until I get paid?"</b> Be honest: it sells at auction and you are paid <b>30 to 45 days after the buyer's payment is received</b>. The reserve protects you, and a cash advance is available.</li>
  <li><b>"What if it does not sell?"</b> The reserve floor protects them, plus relist and return options.</li>
  <li><b>"I want a higher reserve."</b> Educate that too high a reserve kills the sale and leaves them with nothing. Set it to protect and to sell.</li>
  <li><b>"Why you and not Heritage?"</b> Differentiate on whole-estate, local, white-glove, and faster payout. Be the better fit, not the cheaper option.</li></ul>`,
 "c3.5":`<p>The fastest way to lose money long term is to over-promise to win a signature today. Two gates protect everyone's pay: the review rating and the collection rate. A disappointed consignor damages both.</p>
  <ul><li><b>State payout correctly:</b> it sells at auction, and the consignor is paid <b>30 to 45 days after the buyer's payment is received</b>, not 30 to 45 days after the hammer falls. Getting this wrong on the phone creates an angry call later.</li>
  <li><b>Never inflate the estimate</b> to close. A consignor who expected double and got fair leaves a one-star review.</li>
  <li><b>What-if-it-does-not-sell is handled by the reserve,</b> not a promise it always sells.</li>
  <li>The honest number, set against real comparable results, is the one that protects the gates.</li></ul>`,
 "c3.8":`<p>You earn the solo seat by reps, not by a quiz. Run live calls with a manager listening, then fully solo.</p>
  <ul><li><b>The target is hammer value originated,</b> not number of pitches. One signed estate can outweigh a month of small lots.</li>
  <li><b>Ramp:</b> a new closer should sign their first consignment within one to two months.</li>
  <li><b>Efficiency is the skill:</b> the routing question, the two-number anchor, and getting the DocuSign out on the call exist so you spend time only on deals that carry money and close them without haggling.</li></ul>`,
 "m4.1":`<p>As a manager you hold reserve authority. Approve reserves and terms within your limit, catch the closer who set a reserve too high or too low, and escalate the deals above your authority. The reserve discipline of the whole floor is your responsibility.</p>`,
 "m4.2":`<p>You own the consignor from signed agreement to payout, which is 30 to 45 days after the buyer's payment is received. Keep them informed, manage expectations through the sale, and handle the unhappy consignor with the reserve and the facts, not promises.</p>`,
 "m4.3":`<p>The numbers you protect: hammer originated, close rate, sell-through, and payout timing, against the rating and collection gates. What you do not measure, you cannot manage.</p>`,
 "m4.4":`<p>You build closers. Certify them honestly, run weekly one-on-ones, and calibrate reserve discipline so a sign-off means the same thing on your floor as on any other.</p>`,
};

function statusOf(id){
 const p=S.progress[id];
 if(p&&p.status==="cert")return "cert";
 const idx=ORDER.indexOf(id);
 if(S.preview)return p?p.status:"avail";
 if(idx===0||(S.progress[ORDER[idx-1]]&&S.progress[ORDER[idx-1]].status==="cert"))return p?p.status:"avail";
 return "locked";
}

 document.getElementById("metricsTop").innerHTML=`<div class="metrics">
   <div class="metric"><div class="n">${certs}/${MOD.length}</div><div class="l">Modules certified</div></div>

}

function openModule(m){
 show("module");const v=document.getElementById("v-module");
 if(m.type==="drill"){renderDrill(m,v);return}
 v.innerHTML=`<button class="btn ghost small" onclick="go('ladder')">&larr; Ladder</button>

  <p class="sub">${m.cert}</p>
  <div class="panel brief">${briefFor(m)}</div>
  <h3>Test &middot; pass ${m.pass}% &middot; up to 20 questions</h3><div id="test"></div>`;
 renderTest(m,bankFor(m));
}
function pick(b,n){const a=[...b];for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a.slice(0,Math.min(n,a.length))}
function shuffleOpts(q){const idx=q.a.map((_,i)=>i);for(let i=idx.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[idx[i],idx[j]]=[idx[j],idx[i]]}
 return {q:q.q,a:idx.map(i=>q.a[i]),c:idx.indexOf(q.c)}}
function renderTest(m,bankRaw){
 const qs=pick(bankRaw,20).map(shuffleOpts),ans={},el=document.getElementById("test");
 el.innerHTML=qs.map((q,i)=>`<div class="q"><b>${i+1}. ${q.q}</b>
   ${q.a.map((o,j)=>`<span class="opt" data-q="${i}" data-o="${j}">${o}</span>`).join("")}</div>`).join("")
   +`<div class="row" style="margin-top:14px"><button class="btn" id="submitTest">Submit test</button><span id="testmsg" class="muted small"></span></div>`;
 el.querySelectorAll(".opt").forEach(o=>o.onclick=()=>{const qi=o.dataset.q;
   el.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(x=>x.classList.remove("sel"));o.classList.add("sel");ans[qi]=+o.dataset.o});
 document.getElementById("submitTest").onclick=()=>{
   if(Object.keys(ans).length<qs.length){document.getElementById("testmsg").textContent="Answer every question first.";return}
   let right=0;qs.forEach((q,i)=>{const sel=el.querySelector(`.opt[data-q="${i}"][data-o="${ans[i]}"]`),cor=el.querySelector(`.opt[data-q="${i}"][data-o="${q.c}"]`);
     if(ans[i]===q.c){right++;sel.classList.add("correct")}else{sel.classList.add("wrong");cor.classList.add("correct")}});
   const score=Math.round(right/qs.length*100),passed=score>=m.pass,P=S.progress[m.id]||{};P.best=Math.max(P.best||0,score);
   if(passed&&P.status!=="cert")P.status="await";S.progress[m.id]=P;save();
   document.getElementById("testmsg").innerHTML=passed?`<b style="color:var(--green)">Passed ${score}%.</b> A manager certifies you in the Admin tab.`:`<b style="color:var(--red)">${score}%.</b> Need ${m.pass}%. Review the briefing and retake.`;
   document.getElementById("submitTest").disabled=true;
 };
}

 function pushMsg(who,txt){convo.push({role:who==="me"?"user":"assistant",content:txt});
   const c=document.getElementById("chat");c.innerHTML+=`<div class="msg ${who}">${txt.replace(/</g,"&lt;")}</div>`;c.scrollTop=c.scrollHeight}
 document.getElementById("sendBtn").onclick=async()=>{const t=document.getElementById("say").value.trim();if(!t||!persona)return;
   document.getElementById("say").value="";pushMsg("me",t);const dm=document.getElementById("dmsg");dm.textContent="...";
   try{const r=await fetch(S.settings.proxyUrl,{method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({passcode:S.settings.proxyPass,mode:"chat",persona,messages:convo})});
     const d=await r.json();dm.textContent="";pushMsg("them",d.reply||"(no reply)")}catch(e){dm.textContent="Connection error. Check the proxy in Admin."}};
 document.getElementById("endBtn").onclick=async()=>{if(!persona||convo.length<2){document.getElementById("dmsg").textContent="Have a real conversation first.";return}
   const dm=document.getElementById("dmsg");dm.textContent="Scoring...";
   try{const r=await fetch(S.settings.proxyUrl,{method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({passcode:S.settings.proxyPass,mode:"score",persona,messages:convo,checklist:CHECKLIST[m.drill],gradingContext:persona.band})});
     const d=await r.json();dm.textContent="";showScore(m,d,convo,persona)}catch(e){dm.textContent="Scoring error. Check the proxy in Admin."}};
}
function showScore(m,d,convo,persona){
 const beats=d.beats||[],val={hit:1,partial:.5,miss:0};
 const score=beats.length?Math.round(beats.reduce((s,b)=>s+(val[b.state]||0),0)/beats.length*100):0;
 const P=S.progress[m.id]||{reps:[]};P.reps=P.reps||[];P.reps.push(score);P.best=Math.max(P.best||0,score);
 const good=P.reps.filter(r=>r>=S.settings.passTarget).length;
 if(good>=S.settings.passQuota&&P.status!=="cert"&&P.status!=="await")P.status="await";
 S.progress[m.id]=P;
 if(score>=90){S.bestCalls.unshift({modName:m.name,persona:persona.name,score,date:new Date().toLocaleDateString(),
   transcript:convo.map(x=>(x.role==="user"?"REP: ":"SELLER: ")+x.content)});S.bestCalls=S.bestCalls.slice(0,30)}
 save();
 const area=document.getElementById("scoreArea");area.classList.remove("hide");
 area.innerHTML=`<h3>Result</h3><div class="score">${score}</div><p class="muted small">${d.note||""}</p>
   ${beats.map(b=>`<div class="beat"><span class="dot ${b.state}"></span><div><b>${(CHECKLIST[m.drill].find(c=>c.id===b.id)||{label:b.id}).label}</b>
     ${b.example?`<div class="muted small">Great sounds like: ${b.example}</div>`:""}</div></div>`).join("")}
   <p class="small" style="margin-top:12px">Strong reps: <b>${good}/${S.settings.passQuota}</b>${good>=S.settings.passQuota?' &middot; <span style="color:var(--green)">Quota met. A manager can certify you.</span>':""}${score>=90?' &middot; <span style="color:var(--gold)">Saved to Best calls.</span>':""}</p>`;
 area.scrollIntoView({behavior:"smooth"});
}

/* ===== best calls ===== */
function renderBestCalls(){const v=document.getElementById("v-bestcalls");
 if(!S.bestCalls.length){v.innerHTML=`<h1>Best calls</h1><p class="sub">Every drill scoring 90 or higher is saved here, so the next rep learns from the team's own best closes. None saved yet.</p>`;return}
 v.innerHTML=`<h1>Best calls</h1><p class="sub">Drills that scored 90 or higher. Study how the best reps run CLOSE.</p>`+
  S.bestCalls.map(c=>`<div class="panel"><div class="row" style="justify-content:space-between">
    <b>${c.modName} &middot; ${c.persona}</b><span class="muted small">${c.score} &middot; ${c.date}</span></div>
    <div style="margin-top:10px">${c.transcript.map(l=>`<div class="msg ${l.startsWith('REP')?'me':'them'}" style="max-width:100%">${l.replace(/</g,"&lt;")}</div>`).join("")}</div></div>`).join("");

/* ===== admin ===== */
function renderAdmin(){const v=document.getElementById("v-admin");
 v.innerHTML=`<h1>Admin & manager console</h1>
  <div class="panel" id="gate"><h3 style="margin-top:0">Sign in</h3>
   <label class="f">Passcode (admin or manager)</label>
   <div class="row"><input id="pc" type="password" placeholder="Passcode" style="max-width:260px">
     <button class="btn" id="signin">Sign in</button><span id="gatemsg" class="muted small"></span></div></div>
  <div id="adminBody" class="hide"></div>`;
 document.getElementById("signin").onclick=()=>{const pc=document.getElementById("pc").value;
   if(pc===S.settings.adminPass)buildAdmin("admin");else if(pc===S.settings.mgrPass)buildAdmin("manager");
   else document.getElementById("gatemsg").textContent="Wrong passcode."};
}
function buildAdmin(role){
 document.getElementById("gate").classList.add("hide");
 const b=document.getElementById("adminBody");b.classList.remove("hide");
 const awaiting=MOD.filter(m=>(S.progress[m.id]||{}).status==="await");
 let h=`<div class="panel"><h3 style="margin-top:0">Certify (${role})</h3>
   ${awaiting.length?"":'<p class="muted small">Nothing awaiting sign-off.</p>'}
   ${awaiting.map(m=>`<div class="kv"><span>${m.id} ${m.name} <span class="muted small">best ${(S.progress[m.id].best||0)}%</span></span>
     <button class="btn small" data-cert="${m.id}">Certify</button></div>`).join("")}
   <label class="f">Certifier name (recorded on the certificate)</label>
   <input id="certName" placeholder="Manager name" value="${S.settings.certifier||""}" style="max-width:300px"></div>
   <div class="panel"><h3 style="margin-top:0">Real-world numbers</h3>
   <p class="muted small">Hammer originated and close rate are real outcomes, entered here, so training scores sit next to results.</p>
   <div class="row"><div style="flex:1;min-width:120px"><label class="f">Hammer originated ($)</label><input id="mh" type="number" value="${S.metrics.hammer||0}"></div>
     <div style="flex:1;min-width:90px"><label class="f">Pitches</label><input id="mp" type="number" value="${S.metrics.pitches||0}"></div>
     <div style="flex:1;min-width:90px"><label class="f">Signed</label><input id="ms" type="number" value="${S.metrics.signed||0}"></div></div>
   <div class="row" style="margin-top:10px"><button class="btn" id="saveMetrics">Save numbers</button></div></div>`;
 if(role==="admin"){
  h+=`<div class="panel"><h3 style="margin-top:0">Practice server (proxy)</h3>
    <label class="f">Proxy URL</label><input id="px" value="${S.settings.proxyUrl}" placeholder="https://your-proxy.vercel.app/api/drill">
    <label class="f">Proxy passcode</label><input id="pxp" value="${S.settings.proxyPass}" placeholder="shared drill passcode">
    <div class="row" style="margin-top:10px"><button class="btn" id="saveProxy">Save</button>
      <button class="btn ghost" id="testProxy">Test connection</button><span id="pxmsg" class="muted small"></span></div></div>
   <div class="panel"><h3 style="margin-top:0">Location & certification</h3>
    <label class="f">Location</label><input id="loc" value="${S.settings.location}">
    <label class="f">Default certifier for this location</label><input id="cf" value="${S.settings.certifier}">
    <div class="row"><div style="flex:1;min-width:120px"><label class="f">Strong-rep quota</label><input id="quota" type="number" value="${S.settings.passQuota}"></div>
      <div style="flex:1;min-width:120px"><label class="f">Drill target score</label><input id="target" type="number" value="${S.settings.passTarget}"></div></div>
    <div class="row" style="margin-top:10px"><button class="btn" id="saveLoc">Save location</button></div></div>
   <div class="panel"><h3 style="margin-top:0">Passcodes</h3>
    <label class="f">Admin passcode</label><input id="ap" value="${S.settings.adminPass}">
    <label class="f">Manager passcode</label><input id="mpp" value="${S.settings.mgrPass}">
    <div class="row" style="margin-top:10px"><button class="btn" id="savePass">Save passcodes</button></div></div>
   <div class="panel"><h3 style="margin-top:0">Progress</h3><table><tr><th>Module</th><th>Status</th><th>Best</th></tr>
    ${MOD.map(m=>{const p=S.progress[m.id]||{};return `<tr><td>${m.id} ${m.name}</td><td>${p.status||"-"}</td><td>${p.best||0}%</td></tr>`}).join("")}</table>
    <div class="row" style="margin-top:12px"><button class="btn ghost" id="prev">${S.preview?"Exit preview mode":"Enter preview mode"}</button>
      <button class="btn ghost" id="reset">Reset all progress</button></div></div>`;
 }
 b.innerHTML=h;
 b.querySelectorAll("[data-cert]").forEach(btn=>btn.onclick=()=>{const id=btn.dataset.cert,name=document.getElementById("certName").value.trim();
   if(!name){alert("Enter the certifier name first.");return}
   S.progress[id].status="cert";S.progress[id].certifier=name;S.settings.certifier=name;save();alert(id+" certified by "+name);buildAdmin(role);renderLadder()});
 document.getElementById("saveMetrics").onclick=()=>{S.metrics.hammer=+document.getElementById("mh").value||0;S.metrics.pitches=+document.getElementById("mp").value||0;S.metrics.signed=+document.getElementById("ms").value||0;save();alert("Numbers saved.");renderMetricsTop()};
 if(role==="admin"){
  document.getElementById("saveProxy").onclick=()=>{S.settings.proxyUrl=document.getElementById("px").value.trim();S.settings.proxyPass=document.getElementById("pxp").value.trim();save();document.getElementById("pxmsg").textContent="Saved."};
  document.getElementById("testProxy").onclick=async()=>{const pxmsg=document.getElementById("pxmsg");pxmsg.textContent="Testing...";
    try{const r=await fetch(document.getElementById("px").value.trim(),{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({passcode:document.getElementById("pxp").value.trim(),mode:"chat",persona:PERSONA.whale,messages:[{role:"user",content:"Hello"}]})});
      const d=await r.json();pxmsg.textContent=d.reply?"Connected. Server replied.":(d.error||"No reply.")}catch(e){pxmsg.textContent="Could not reach the proxy."}};
  document.getElementById("saveLoc").onclick=()=>{S.settings.location=document.getElementById("loc").value;S.settings.certifier=document.getElementById("cf").value;S.settings.passQuota=+document.getElementById("quota").value||6;S.settings.passTarget=+document.getElementById("target").value||80;save();alert("Location saved.")};
  document.getElementById("savePass").onclick=()=>{S.settings.adminPass=document.getElementById("ap").value;S.settings.mgrPass=document.getElementById("mpp").value;save();alert("Passcodes saved.")};
  document.getElementById("prev").onclick=()=>{S.preview=!S.preview;save();renderLadder();buildAdmin(role)};
  document.getElementById("reset").onclick=()=>{if(confirm("Erase all progress, metrics, and best calls?")){S.progress={};S.metrics={hammer:0,pitches:0,signed:0};S.bestCalls=[];S.preview=false;save();renderLadder();buildAdmin(role)}};
 }
}

/* ===== nav ===== */
function show(view){["ladder","module","playbook","bestcalls","admin"].forEach(v=>document.getElementById("v-"+v).classList.toggle("hide",v!==view))}
function go(v){show(v);document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  if(v==="ladder")renderLadder();if(v==="playbook")renderPlaybook();if(v==="bestcalls")renderBestCalls();if(v==="admin")renderAdmin()}
document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>go(b.dataset.v));
renderLadder();
</script>
